version: "3.8"
services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: user_mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    networks:
      - altees-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    mem_limit: 256m

  app:
    build:
        context: .
    image: spring-security-jwt:1
    container_name: spring-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - altees-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/user_mgmt
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: testpass
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 256m
    mem_reservation: 212M
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3


volumes:
  postgres-data:

networks:
  altees-network:
    external: true
    name: altees-net